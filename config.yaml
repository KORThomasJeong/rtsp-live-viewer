# rtsp-live-viewer 설정 파일 (커밋되는 "샘플 기본값")
#
# 실제 카메라 주소·계정 같은 운영값은 여기 하드코딩하지 말 것.
# → 로컬 `.env`(git 미추적, `.env.sample` 복사) 또는 웹 설정 페이지에서 지정한다.
# 적용 우선순위(낮음→높음): 이 파일 ← .env(환경변수) ← 웹 설정(data/settings.json).
# 환경변수 RLV_CONFIG 로 이 파일 경로를 바꿀 수 있다.

encoder: auto            # auto|libx264|h264_videotoolbox|h264_nvenc|h264_qsv (RLV_ENCODER로 override)
height: 720              # 출력 세로 해상도(px). 0=원본 유지.
fps: 30                  # 출력 프레임레이트.
video_bitrate: 2500k     # 비디오 비트레이트(시청자당 대역폭 ≈ 이 값).
audio_mode: aac          # aac(재인코딩) | copy(원본 통과) | none(무음)
audio_bitrate: 128k      # audio_mode=aac일 때 오디오 비트레이트.
hls_time: 2              # HLS 세그먼트 길이(초).
hls_list_size: 6         # 재생목록에 유지할 세그먼트 수.
buffer_seconds: 6        # 플레이어 버퍼(초)=hls.js liveSyncDuration. 작을수록 지연↓/끊김 위험↑.
catch_up_rate: 1.2       # 라이브 따라잡기 배속(maxLiveSyncPlaybackRate).
grid_columns: auto       # 뷰어 그리드 열 수: auto|1|2|3|4
idle_timeout: 30         # 시청자 없을 때 N초 후 ffmpeg 자동 정지(0=비활성).
output_dir: /tmp/rtsp_live  # HLS 출력 디렉터리.

# 인증(HTTP Digest). 실제 비밀번호는 .env(RLV_AUTH_PASSWORD) 또는 웹 설정에서 지정.
auth: { enabled: false, user: admin, password: "" }

# 채널 목록(샘플). 실제 URL은 .env 의 RLV_STREAM_<ID>_URL 로 주입하거나 웹 설정에서 변경.
# (192.0.2.x 는 문서용 예약 대역 TEST-NET-1)
streams:
  - { id: cam0, name: "Camera 0", url: "rtsp://192.0.2.10/0", enabled: true }
  - { id: cam1, name: "Camera 1", url: "rtsp://192.0.2.10/1", enabled: true }
