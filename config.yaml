# rtsp-live-viewer 설정 파일
# 환경변수 RLV_CONFIG 로 다른 경로를 지정할 수 있다(기본: 프로젝트 루트의 이 파일).

encoder: auto            # 인코더 선택: auto|libx264|h264_videotoolbox|h264_nvenc|h264_qsv
                         #   auto      = 환경에서 사용 가능한 HW 인코더 자동 탐지, 없으면 libx264
                         #   libx264   = 소프트웨어(CPU) 인코딩, 어디서나 동작
                         #   h264_videotoolbox = macOS HW 인코딩(컨테이너 불가, Mac 네이티브만)
                         #   h264_nvenc        = NVIDIA GPU HW 인코딩
                         #   h264_qsv          = Intel Quick Sync HW 인코딩
                         # 환경변수 RLV_ENCODER 로 override 가능.
height: 720              # 출력 세로 해상도(px). 0이면 원본 해상도 그대로 사용.
fps: 30                  # 출력 프레임레이트(frames/sec).
video_bitrate: 2500k     # 비디오 비트레이트. 시청자당 대역폭 ≈ 이 값.
hls_time: 2              # HLS 세그먼트 길이(초). 작을수록 지연 짧음/요청 증가.
idle_timeout: 30         # 시청자가 없을 때 N초 후 ffmpeg 자동 정지(0=비활성, 항상 유지).
output_dir: /tmp/rtsp_live  # HLS 세그먼트(.m3u8/.ts) 출력 디렉터리.

auth: { enabled: false, user: admin, password: admin }  # 기본 인증(HTTP Basic). enabled=true면 user/password 적용.

streams:                 # 채널 목록. 동시 2~4채널 재생 권장.
  - { id: cam0, name: "채널 0", url: "rtsp://10.10.3.50/0" }  # id=내부 식별자/URL 경로, name=표시 이름, url=소스(RTSP/RTMP/HTTP)
  - { id: cam1, name: "채널 1", url: "rtsp://10.10.3.50/1" }
